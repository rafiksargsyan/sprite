spring.application.name=main-ctx

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

rabbitmq.queue=testqueue
rabbitmq.topic.exchange.name=testtopicexchange

spring.rabbitmq.host=seal-01.lmq.cloudamqp.com
spring.rabbitmq.port=5672
spring.rabbitmq.username=ntpbyaox
spring.rabbitmq.password=
spring.rabbitmq.virtual-host=ntpbyaox