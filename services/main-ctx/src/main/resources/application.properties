spring.application.name=main-ctx

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

rabbitmq.queue=testqueue
rabbitmq.topic.exchange.name=testtopicexchange

spring.rabbitmq.host=${RABBITMQ_HOST:collie-01.lmq.cloudamqp.com}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST}

s3.access-key-id=${S3_ACCESS_KEY_ID}
s3.secret-access-key=${S3_SECRET_ACCESS_KEY}
s3.region=${S3_REGION:eu-central-003}
s3.endpoint=${S3_ENDPOINT:https://s3.eu-central-003.backblazeb2.com}
s3.bucket=${S3_BUCKET}

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://securetoken.google.com/${FIREBASE_PROJECT_ID:sprite-6193a}

job.max-video-file-size-bytes=${JOB_MAX_VIDEO_FILE_SIZE_BYTES:5368709120}
job.min-free-disk-space-bytes=${JOB_MIN_FREE_DISK_SPACE_BYTES:107374182400}
job.processing-pool-size=${JOB_PROCESSING_POOL_SIZE:5}
job.heartbeat-interval-seconds=${JOB_HEARTBEAT_INTERVAL_SECONDS:30}
job.base-output-folder=${JOB_BASE_OUTPUT_FOLDER:/tmp/sprite}

logging.level.com.rsargsyan.sprite=INFO
